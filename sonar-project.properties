# SonarQube / SonarCloud project configuration for l9-ci-sdk.
#
# ORG-LEVEL config only. pr-checks.yml derives sonar.projectKey from the repo
# (<owner>_<name>, SonarCloud's GitHub import convention) and defaults
# sonar.organization to `quantum-l9`, so the ONLY thing required is the
# org-level SONAR_TOKEN secret (visible to this repo). Optional org-level
# overrides: variable SONAR_ORGANIZATION (overrides the default) and
# SONAR_HOST_URL (self-hosted only; defaults to https://sonarcloud.io).

sonar.projectName=l9-ci-sdk
sonar.sources=l9_ci
sonar.tests=tests
sonar.python.version=3.11,3.12

# Coverage produced by the pr-checks `quality` job (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,build/**,dist/**,**/*.egg-info/**
sonar.coverage.exclusions=tests/**
sonar.sourceEncoding=UTF-8
