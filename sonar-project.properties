# SonarQube / SonarCloud project configuration for l9-ci-sdk.
#
# projectKey / organization / host are supplied by CI from repo variables
# (SONAR_PROJECT_KEY, SONAR_ORGANIZATION, SONAR_HOST_URL) via pr-checks.yml, so
# no project identifiers are hardcoded/guessed here. Set those repo variables
# (Settings -> Secrets and variables -> Actions -> Variables) plus the
# SONAR_TOKEN secret, and the scan runs. SONAR_HOST_URL defaults to
# https://sonarcloud.io when unset.

sonar.projectName=l9-ci-sdk
sonar.sources=l9_ci
sonar.tests=tests
sonar.python.version=3.11,3.12

# Coverage produced by the pr-checks `quality` job (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,build/**,dist/**,**/*.egg-info/**
sonar.coverage.exclusions=tests/**
sonar.sourceEncoding=UTF-8
