# SonarQube / SonarCloud project configuration for l9-ci-sdk.
#
# ORG-LEVEL config only. pr-checks.yml derives sonar.projectKey from the repo
# (<owner>_<name>, SonarCloud's GitHub import convention), so NO per-repo
# variable is needed. Set at the Quantum-L9 ORG level:
#   - secret   SONAR_TOKEN
#   - variable SONAR_ORGANIZATION   (e.g. quantum-l9)
#   - variable SONAR_HOST_URL       (only for self-hosted; defaults to
#                                    https://sonarcloud.io)
# with visibility that includes this repo.

sonar.projectName=l9-ci-sdk
sonar.sources=l9_ci
sonar.tests=tests
sonar.python.version=3.11,3.12

# Coverage produced by the pr-checks `quality` job (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,build/**,dist/**,**/*.egg-info/**
sonar.coverage.exclusions=tests/**
sonar.sourceEncoding=UTF-8
