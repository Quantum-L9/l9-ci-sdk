# SonarQube / SonarCloud project configuration for l9-ci-sdk.
#
# REQUIRED before analysis produces results — Unknown here, MUST be filled in
# (do not guess). Get them from your SonarCloud/SonarQube project:
sonar.projectKey=UNKNOWN_SET_SONAR_PROJECT_KEY
sonar.organization=UNKNOWN_SET_SONAR_ORGANIZATION
# For SonarCloud, uncomment:
# sonar.host.url=https://sonarcloud.io
# For self-hosted SonarQube, provide SONAR_HOST_URL via CI env/variable instead.

sonar.projectName=l9-ci-sdk
sonar.sources=l9_ci
sonar.tests=tests
sonar.python.version=3.11,3.12

# Coverage produced by the pr-checks `quality` job (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,build/**,dist/**,**/*.egg-info/**
sonar.coverage.exclusions=tests/**
sonar.sourceEncoding=UTF-8
