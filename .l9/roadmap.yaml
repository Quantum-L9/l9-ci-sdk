schema: l9.roadmap-spec/v1
metadata:
  repository: Quantum-L9/l9-ci-sdk
  status: active
phases:
  - id: P0
    title: Architecture and contracts
    status: complete
  - id: P1
    title: Semgrep vertical slice
    status: complete
    evidence:
      runtime_fixture: tests/fixtures/semgrep/runtime/provenance.yaml
  - id: P2
    title: Integration and release readiness
    status: complete
  - id: P3
    title: Spec closure
    status: complete
    evidence:
      release_blocker_closure: .l9/audit-findings.md
  - id: P4
    title: Semgrep shadow rollout
    status: ready_for_promotion
    blockers: []
    evidence:
      core_gate_publication: "{{CORE_GATE_PUBLICATION_RUN_URL}}"
      core_gate_check: "{{CORE_GATE_CHECK_URL}}"
      required_check_ruleset: "{{AUD_008_RULESET_URL}}"
  - id: P5
    title: Second provider selection
    status: deferred
    candidates:
      - Gitleaks
      - SARIF importer
    rule: >-
      No second provider begins until Semgrep is supported and the bundle
      protocol has no known breaking defects.
GA:
  criteria:
    - one supported provider
    - stable v1 artifact protocol
    - stable public Python API
    - stable Core integration contract
    - compatibility fixtures
    - deterministic outputs
    - documented migration and rollback
