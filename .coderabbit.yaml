# CodeRabbit configuration for l9-ci-sdk.
# Schema: https://docs.coderabbit.ai/reference/configuration
#
# CodeRabbit runs as a GitHub App — install it on the Quantum-L9 org (or this
# repo) from https://github.com/apps/coderabbitai. CODERABBIT_TOKEN is only
# needed for the API/self-hosted plan, not the SaaS app.

language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!build/**"
    - "!dist/**"
    - "!*.egg-info/**"
  path_instructions:
    - path: "l9_ci/**"
      instructions: >
        Enforce L9 SDK invariants. TransportPacket is the only wire contract;
        never reintroduce PacketEnvelope usage. The CLI command surface and the
        agent-review-payload field set are a public contract consumed by
        l9-ci-core and PR_Repair — flag any change that renames or removes a
        command or a payload key. Scanners must scan only their intended file
        suffixes and use the git-aware file enumerator, whose auto mode keys off
        the path being scanned, not the process working directory.
    - path: "tests/**"
      instructions: >
        Prefer behavior assertions over implementation details. Tests must pass
        when run inside a git checkout (as in CI), not only from a non-git
        working directory.

chat:
  auto_reply: true
