# L9 wiring check
#
# Runs tests/test_l9_wiring.py on every PR so a careless edit to the l9-analysis
# callers or .github/governance cannot silently drift this repo out of
# correctness with respect to l9-ci-core (SHA-pinned refs, least privilege,
# profile/matrix consistency, governance-as-JSON, semgrep configured).
name: L9 Wiring Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: l9-wiring-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wiring:
    name: L9 wiring invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
      - name: Install parser
        run: python -m pip install --quiet --disable-pip-version-check pyyaml
      - name: Run L9 wiring invariants
        run: python -m unittest tests.test_l9_wiring --verbose
