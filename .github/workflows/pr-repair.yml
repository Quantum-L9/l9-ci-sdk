# --- L9_META ---
# origin: l9-ci-enablement (adapted for l9-ci-sdk)
# layer: [ci, implementer, handoff]
# tags: [pr-repair, implementer-bot, payload-source, proposal-only]
# owner: platform
# status: active
# --- /L9_META ---
#
# L9 Implementer handoff — PAYLOAD SOURCE ONLY.
#
# The Implementer Bot itself lives in Quantum-L9/PR_Repair and is intentionally
# NOT vendored here. This workflow only produces the agent_review_payload.json
# that PR_Repair consumes, and (optionally) notifies PR_Repair that a payload is
# ready. It never applies fixes, never pushes, never merges.
#
# DEFAULT IS SAFE: dry_run, no dispatch unless a cross-repo token is present.
# Manual only (workflow_dispatch).

name: PR Repair (handoff to PR_Repair)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number the payload describes (for the handoff event)."
        required: false
        type: string
      dispatch:
        description: "Notify Quantum-L9/PR_Repair that a payload is ready (requires L9_IMPLEMENTER_BOT_TOKEN)."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pr-repair-${{ github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  emit-and-handoff:
    name: Emit payload, hand off to PR_Repair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Preflight — governance doc
        run: |
          if [ ! -f AGENT.md ]; then
            echo "::error::AGENT.md is required by the L9 Implementer contract but is missing."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install l9-ci (this repo is the SDK)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Emit agent_review_payload.json
        run: |
          mkdir -p artifacts/ci
          for stage in validate lint test security transport-contract deprecated-api thresholds; do
            l9-ci run-pipeline --stage "$stage" --ci github --emit-dir artifacts/ci || true
          done
          l9-ci gate \
            --input-dir artifacts/ci \
            --required validate,lint,test,security \
            --emit-agent-payload artifacts/agent_review_payload.json || true
          test -f artifacts/agent_review_payload.json

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-review-payload
          path: artifacts/agent_review_payload.json
          if-no-files-found: error

      # Cross-repo handoff. The Implementer Bot (PR_Repair) must expose an
      # `on: repository_dispatch` handler for event type `l9-implementer-review`.
      # Cross-repo dispatch needs a token with access to PR_Repair; the default
      # GITHUB_TOKEN cannot reach another repo, so this is guarded and skipped
      # (with a notice) when L9_IMPLEMENTER_BOT_TOKEN is absent. It carries no
      # bot logic — only a pointer to the run that produced the payload.
      - name: Notify PR_Repair (guarded)
        if: ${{ github.event.inputs.dispatch == 'true' }}
        env:
          HANDOFF_TOKEN: ${{ secrets.L9_IMPLEMENTER_BOT_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          if [ -z "$HANDOFF_TOKEN" ]; then
            echo "::warning::L9_IMPLEMENTER_BOT_TOKEN absent — skipping cross-repo dispatch. Payload is available as the 'agent-review-payload' artifact for PR_Repair to consume."
            exit 0
          fi
          # --fail-with-body makes curl exit non-zero on a non-2xx response
          # (e.g. 401/404) while still printing the API error body, so an
          # operator-triggered dispatch that never happened fails the job
          # instead of silently reporting success.
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${HANDOFF_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Quantum-L9/PR_Repair/dispatches \
            -d "$(printf '{"event_type":"l9-implementer-review","client_payload":{"source_repo":"%s","run_id":"%s","pr_number":"%s"}}' \
                  "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$PR_NUMBER")"
