name: L9 Analysis (Release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    uses: Quantum-L9/l9-ci-core/.github/workflows/analyze-semgrep.yml@{{CORE_ANALYZE_SHA}}
    permissions:
      actions: read
      checks: write
      contents: read
    with:
      profile: release
      matrix-id: release-semgrep
      sdk-revision: "{{SDK_CODE_SHA}}"
      semgrep-configs-json: '["p/python"]'
