name: L9 Analysis (Nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    uses: Quantum-L9/l9-ci-core/.github/workflows/analyze-semgrep.yml@{{CORE_ANALYZE_SHA}}
    permissions:
      actions: read
      checks: write
      contents: read
    with:
      profile: nightly
      matrix-id: nightly-semgrep
      sdk-revision: "{{SDK_CODE_SHA}}"
      semgrep-configs-json: '["p/python"]'
