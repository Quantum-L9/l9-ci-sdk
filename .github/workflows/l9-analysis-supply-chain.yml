# L9 analysis caller — this repository's OWN live analysis workflow (variant).
#
# Ownership (AUD-006): GitHub Actions orchestration, the reusable analysis
# workflows, and the copy-in caller template are owned by l9-ci-core, NOT this
# SDK. This is l9-ci-sdk's own minimal caller for its own runs; it is not a
# template to be copied into other repos. All real steps delegate to Core-owned
# composite actions and Core's reusable publish-analysis.yml. See
# .l9/ownership.yaml workflow_ownership and .github/workflows/l9-analysis.yml.

name: L9 Analysis (Supply Chain)

on:
  schedule:
    - cron: "30 3 * * 1"  # 03:30 UTC every Monday — edit to taste
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: l9-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the event: pr_fast for pull_request, merge for push, nightly/release/
  # supply_chain as appropriate. Must be allowed_events in execution-profiles.yaml.
  L9_PROFILE: "supply_chain"
  L9_MATRIX_ID: "supply-chain-semgrep"
  # Core is pinned to the immutable commit f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
  # (or replace with the v2 tag once published). `uses:` does not support
  # expression interpolation, so this SHA is duplicated literally on every
  # `uses: Quantum-L9/l9-ci-core/...@<sha>` line below — update all of them
  # together when bumping the pin.

jobs:
  analyze:
    name: Analyze (semgrep -> SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.gov.outputs.mode }}
      enabled: ${{ steps.gov.outputs.enabled }}
      artifact-name: ${{ steps.names.outputs['artifact-name'] }}
      governance-digest: ${{ steps.gov.outputs['governance-digest'] }}
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${REPOSITORY}.git"

      - id: gov
        name: Resolve governance (Core)
        uses: Quantum-L9/l9-ci-core/.github/actions/resolve-governance@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          profile: ${{ env.L9_PROFILE }}
          provider: semgrep
          event-name: ${{ github.event_name }}
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          governance-root: .github/governance

      - id: names
        name: Resolve artifact name
        env:
          MATRIX_ID: ${{ env.L9_MATRIX_ID }}
        run: |
          set -euo pipefail
          echo "artifact-name=l9-semgrep-${MATRIX_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Run semgrep (produce raw report)
        if: steps.gov.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip semgrep
          mkdir -p "artifacts/raw/semgrep/${L9_MATRIX_ID}"
          # ── PER-LANGUAGE RULESETS ──────────────────────────────────────────
          # Python repo:   --config p/python
          # Node.js repo:  --config p/javascript --config p/typescript
          # Polyglot / either: keep all three (semgrep skips rules that do not
          # match any files) or use --config auto.
          # No --error flag: semgrep scan exits 0 on completed scans regardless
          # of findings (gating is the SDK/governance layer's job, not
          # semgrep's exit code) but still exits non-zero on real execution
          # failures (bad config, unparseable rules, etc.) — do not swallow
          # those with `|| true`, or a broken scan silently produces an empty
          # report.
          semgrep scan \
            --config p/python \
            --json-output "artifacts/raw/semgrep/${L9_MATRIX_ID}/report.json"
        env:
          L9_MATRIX_ID: ${{ env.L9_MATRIX_ID }}

      - id: sdk
        name: Provision immutable SDK
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/provision-sdk@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235

      - name: Normalize provider report
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/invoke-sdk@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          executable: ${{ steps.sdk.outputs.executable }}
          operation: semgrep-normalize
          input: artifacts/raw/semgrep/${{ env.L9_MATRIX_ID }}/report.json
          output: .l9/runtime/${{ env.L9_MATRIX_ID }}/finding-bundle.json
          root: .
          snapshot-id: ${{ github.sha }}
          revision: ${{ github.sha }}
          strict: ${{ steps.gov.outputs.strict }}
          required: ${{ steps.gov.outputs['required-provider'] }}
          policy: ${{ steps.gov.outputs['sdk-policy'] }}

      - name: Validate canonical bundle
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/validate-bundle@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          executable: ${{ steps.sdk.outputs.executable }}
          bundle: .l9/runtime/${{ env.L9_MATRIX_ID }}/finding-bundle.json

      - name: Evaluate canonical gate (DWA-003)
        if: steps.gov.outputs.enabled == 'true'
        env:
          SDK: ${{ steps.sdk.outputs.executable }}
          MODE: ${{ steps.gov.outputs.mode }}
          MATRIX_ID: ${{ env.L9_MATRIX_ID }}
        run: |
          set -euo pipefail
          # The canonical gate is the SDK's single verdict authority
          # (gate-spec.yaml). Evaluate it in the pipeline so the verdict is a
          # published artifact, not dead code. Exit mapping: pass=0, fail=7,
          # incomplete/unresolved=6, invalid bundle=5.
          status=0
          "${SDK}" gate evaluate \
            --bundle ".l9/runtime/${MATRIX_ID}/finding-bundle.json" \
            --output ".l9/runtime/${MATRIX_ID}/gate-result.json" \
            --format json || status=$?
          echo "gate-exit-code=${status}" >> "$GITHUB_OUTPUT"
          cat ".l9/runtime/${MATRIX_ID}/gate-result.json" || true
          if [ "${MODE}" = "enforcing" ] && [ "${status}" -ne 0 ]; then
            echo "Gate verdict is blocking in enforcing mode (exit ${status})" >&2
            exit "${status}"
          fi
          if [ "${status}" -ne 0 ]; then
            echo "::warning::L9 gate verdict non-pass (exit ${status}); advisory in ${MODE} mode"
          fi

      - name: Project agent-review payload
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/invoke-sdk@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          executable: ${{ steps.sdk.outputs.executable }}
          operation: bundle-project-agent-payload
          input: .l9/runtime/${{ env.L9_MATRIX_ID }}/finding-bundle.json
          output: .l9/runtime/${{ env.L9_MATRIX_ID }}/agent-review-payload.json
          strict: ${{ steps.gov.outputs.strict }}

      - id: route
        name: Route artifacts
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/route-artifacts@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          provider: semgrep
          matrix-id: ${{ env.L9_MATRIX_ID }}
          raw-report: artifacts/raw/semgrep/${{ env.L9_MATRIX_ID }}/report.json
          bundle: .l9/runtime/${{ env.L9_MATRIX_ID }}/finding-bundle.json
          agent-payload: .l9/runtime/${{ env.L9_MATRIX_ID }}/agent-review-payload.json
          destination-root: artifacts

      - name: Stage gate result for upload
        if: steps.gov.outputs.enabled == 'true'
        env:
          MATRIX_ID: ${{ env.L9_MATRIX_ID }}
        run: |
          set -euo pipefail
          # route-artifacts predates the gate step; stage the verdict alongside
          # the routed canonical outputs so it ships in the same artifact set.
          mkdir -p "artifacts/l9/${MATRIX_ID}"
          cp ".l9/runtime/${MATRIX_ID}/gate-result.json" \
            "artifacts/l9/${MATRIX_ID}/gate-result.json"

      - name: Build artifact manifest
        if: steps.gov.outputs.enabled == 'true'
        uses: Quantum-L9/l9-ci-core/.github/actions/build-artifact-manifest@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
        with:
          provider: semgrep
          matrix-id: ${{ env.L9_MATRIX_ID }}
          sdk-revision: ${{ steps.sdk.outputs['sdk-revision'] }}
          bundle: ${{ steps.route.outputs.bundle }}
          agent-payload: ${{ steps.route.outputs['agent-payload'] }}
          raw-directory: ${{ steps.route.outputs['raw-directory'] }}
          output: artifacts/metadata/${{ env.L9_MATRIX_ID }}/artifact-manifest.json

      - name: Upload analysis artifact set
        if: steps.gov.outputs.enabled == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ steps.names.outputs['artifact-name'] }}
          path: |
            artifacts/raw/semgrep/${{ env.L9_MATRIX_ID }}/
            artifacts/l9/${{ env.L9_MATRIX_ID }}/
            artifacts/metadata/${{ env.L9_MATRIX_ID }}/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish analysis (Core)
    needs: analyze
    if: needs.analyze.outputs.enabled == 'true'
    uses: Quantum-L9/l9-ci-core/.github/workflows/publish-analysis.yml@f7a4ee8c1f4e4413cb3645d088cafa3e9c798235
    permissions:
      actions: read
      checks: write
      contents: read
    with:
      artifact-name: ${{ needs.analyze.outputs['artifact-name'] }}
      profile: supply_chain
      mode: ${{ needs.analyze.outputs.mode }}
      provider: semgrep
      matrix-id: supply-chain-semgrep
      governance-digest: ${{ needs.analyze.outputs['governance-digest'] }}
      repository-revision: ${{ github.sha }}
      workflow-result: ${{ needs.analyze.result }}
