name: L9 Analysis (Supply Chain)

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    uses: Quantum-L9/l9-ci-core/.github/workflows/analyze-semgrep.yml@{{CORE_ANALYZE_SHA}}
    permissions:
      actions: read
      checks: write
      contents: read
    with:
      profile: supply_chain
      matrix-id: supply-chain-semgrep
      sdk-revision: "{{SDK_CODE_SHA}}"
      semgrep-configs-json: '["p/python"]'
